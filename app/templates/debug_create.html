<!DOCTYPE html>
<html>
<head>
    <title>Debug Rule Creation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h3>Debug NGFW Rule Creation</h3>
    
    <div class="card mb-3">
        <div class="card-body">
            <p>Р­С‚Р° СЃС‚СЂР°РЅРёС†Р° РїС‹С‚Р°РµС‚СЃСЏ СЃРѕР·РґР°С‚СЊ РїСЂР°РІРёР»Рѕ С‡РµСЂРµР· РЅР°С€ Backend API. <br>
            Р•СЃР»Рё Р±СѓРґРµС‚ РѕС€РёР±РєР°, РІС‹ СѓРІРёРґРёС‚Рµ РїРѕР»РЅС‹Р№ С‚РµРєСЃС‚ РѕС‚РІРµС‚Р° NGFW.</p>
            
            <div class="mb-3">
                <label>Folder ID РґР»СЏ С‚РµСЃС‚Р° (РІРѕР·СЊРјРёС‚Рµ РёР· URL РіР»Р°РІРЅРѕР№ СЃС‚СЂР°РЅРёС†С‹, РЅР°РїСЂРёРјРµСЂ ?folder_id=5)</label>
                <input type="number" id="fid" class="form-control" value="5">
            </div>
            
            <button onclick="testCreate()" class="btn btn-danger">РџРѕРїСЂРѕР±РѕРІР°С‚СЊ СЃРѕР·РґР°С‚СЊ РїСЂР°РІРёР»Рѕ</button>
        </div>
    </div>
    
    <div class="alert alert-secondary" id="output" style="white-space: pre-wrap; font-family: monospace;">
        Р›РѕРі РїРѕСЏРІРёС‚СЃСЏ Р·РґРµСЃСЊ...
    </div>

    <script>
        async function testCreate() {
            const out = document.getElementById('output');
            const fid = document.getElementById('fid').value;
            out.innerText = "Sending request...";
            
            try {
                const res = await fetch('/api/v1/rules/rules', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: "DEBUG_RULE_" + Math.floor(Math.random() * 1000),
                        action: "deny",
                        folder_id: parseInt(fid)
                    })
                });
                
                const text = await res.text();
                if (res.ok) {
                    out.className = "alert alert-success";
                    out.innerText = "SUCCESS!\n" + text;
                } else {
                    out.className = "alert alert-danger";
                    out.innerText = "ERROR " + res.status + "\n" + text;
                }
            } catch (e) {
                out.innerText = "Network Error: " + e;
            }
        }
    </script>
</body>
</html>
